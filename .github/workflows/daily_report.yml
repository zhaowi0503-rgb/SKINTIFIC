name: Daily Sales Report

on:
  schedule:
    # 每天 UTC 04:00 执行（北京时间 12:00，考虑GitHub Actions延迟，实际约18:00执行）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install gspread google-auth pandas requests numpy

    - name: Create credentials file
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json

    - name: Run report
      env:
        GOOGLE_CREDENTIALS_FILE: /tmp/credentials.json
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      run: |
        python scheduled_report.py

    - name: Commit and push HTML report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add daily_report.html
        git diff --staged --quiet || git commit -m "Update: Daily sales report $(date +'%Y-%m-%d %H:%M')"
        git push
